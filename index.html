<script>
    function sumar() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);

        if (isNaN(n1) || isNaN(n2)) {
            alert("Por favor ingresa ambos números");
            return;
    }

       let resultado = n1 + n2;
       alert("La suma es: " + resultado);

}

 function restar() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);

        if (isNaN(n1) || isNaN(n2)) {
            alert("Por favor ingresa ambos números");
            return;
    }

       let resultado = n1 - n2;
       alert("La resta es: " + resultado);

}

function multiplicar() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);

            alert("Por favor ingresa ambos números");

function dividir() {

            alert("Por favor ingresa ambos números");

}

function raizcuadrada() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);

        if (isNaN(n1)) {
            alert("Por favor ingresa ambos números");

    }

       let resultado = Math.sqrt(n1);
       alert("La raiz cuadrada es: " + resultado);

}

      <h2>Formula general</h2>

<label>Ingrese a:</label>
<input type="number" id="a"><br><br>

<label>Ingrese b:</label>
<input type="number" id="b"><br><br>

<label>Ingrese c:</label>
<input type="number" id="c"><br><br>

<button onclick="x1()">x1</button>
<button onclick="x2()">x2</button>
<br>

<script>
function x1() {
        let a = parseFloat(document.getElementById("a").value);
        let b = parseFloat(document.getElementById("b").value);
        let c = parseFloat(document.getElementById("c").value);
        if (isNaN(a) || isNaN(b)|| isNaN(c) ) {
            alert("Por favor ingresa los 3 números");
            return;
    }

       let resultado = (-b + Math.sqrt(b**2-4*a*c))/ (2*a);
       alert("x1 es: " + resultado);

}

function x2() {
        let a = parseFloat(document.getElementById("a").value);
        let b = parseFloat(document.getElementById("b").value);
        let c = parseFloat(document.getElementById("c").value);
        if (isNaN(a) || isNaN(b)|| isNaN(c) ) {
            alert("Por favor ingresa los 3 números");
            return;
    }

       let resultado = (-b - Math.sqrt(b**2-4*a*c))/ (2*a);
       alert("x2 es: " + resultado);

}
</script>
